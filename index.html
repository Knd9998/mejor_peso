<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Cuerpo Sano - Gestión Gimnasio "Su Mejor Peso"</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-box">
                <h2><i class="fas fa-dumbbell"></i> Cuerpo Sano</h2>
                <h3>Gimnasio "Su Mejor Peso"</h3>
                <p>Ingrese sus credenciales</p>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUser" placeholder="Usuario">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="Contraseña">
                </div>
                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <select id="loginRole">
                        <option value="admin">Administrador</option>
                        <option value="recepcion">Personal Recepción</option>
                        <option value="miembro">Miembro</option>
                        <option value="entrenador">Entrenador</option>
                    </select>
                </div>
                <button id="doLoginBtn" class="btn-primary">Iniciar Sesión</button>
                <button id="cancelLoginBtn" class="btn-secondary">Cancelar</button>
                <div id="loginErrorMsg" class="error-message" style="display:none;">Usuario o contraseña incorrectos.</div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="appScreen" class="screen">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-heartbeat"></i> Cuerpo Sano</h3>
                <span id="userRoleDisplay"></span>
            </div>
            <ul class="menu" id="dynamicMenu"></ul>
            <button id="logoutBtn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <h2 id="pageTitle">Panel de Control</h2>
                <div id="notificationArea" class="notification-area"></div>
            </div>
            <div id="dynamicContent" class="content-pane"></div>
        </div>
        
        <!-- Boton para abrir menu en celular -->
        <button class="menu-toggle" id="menuToggleBtn">
            <i class="fas fa-bars"></i>
        </button>
        
        <!-- Overlay para cerrar menu al hacer clic fuera -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
    </div>

    <!-- Historial Pagos -->
    <div id="historialContainer" style="display: none;">
    <div class="table-responsive">
        <table id="historialPagosTable">
            <thead>
                <tr><th>Monto</th><th>Fecha de Pago</th><th>Tipo de Membresía</th><th>Medio de Pago</th></tr>
            </thead>
            <tbody>
                <tr><td colspan="4" style="text-align: center;">Seleccione un miembro y presione Consultar Historial</td></tr>
            </tbody>
        </table>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
